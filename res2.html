<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronologie - Infrastructure Virtualisée pfSense</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url("pp.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: -1;
        }

        /* HEADER UNIQUE */
        .header-page {
            background: #223447;
            padding: 18px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .header-page h1 {
            color: white;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 1px;
            padding: 0 140px; 
        }

        .back-btn, .next-page-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            color: #e5e7eb;
            border: 1px solid #e5e7eb;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        .back-btn { left: 25px; }
        .next-page-btn { right: 25px; }

        .back-btn:hover, .next-page-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: white;
        }

        /* CAROUSEL CONTENU */
        .wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            gap: 24px;
        }

        .carousel-outer {
            width: 100%;
            max-width: 1100px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carousel-viewport {
            flex: 1;
            overflow: hidden;
            border-radius: 18px;
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            transition: transform 0.5s cubic-bezier(.28, -.03, 0, .99);
        }
